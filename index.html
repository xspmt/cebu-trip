<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 宿务中部旅行地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <header class="trip-header">
        <p class="eyebrow">Cebu Trip Map</p>
        <h1>2026 宿务中部旅行地图</h1>
        <p class="intro">按天查看地点、时间安排和交通路线。数据优先从 Supabase 读取，离线或权限未开启时会回退到本地 CSV。</p>
      </header>

      <section class="panel status-panel">
        <div>
          <h2>数据状态</h2>
          <p id="data-status">正在读取行程数据...</p>
        </div>
        <button class="icon-button" id="refresh-data" type="button" aria-label="刷新数据" title="刷新数据">↻</button>
      </section>

      <section class="panel">
        <h2>日期</h2>
        <div class="day-tabs" id="day-tabs" aria-label="选择日期"></div>
      </section>

      <section class="panel day-panel">
        <h2 id="day-title">行程</h2>
        <p class="day-note" id="day-note"></p>
        <div class="stats">
          <span><strong id="stat-places">0</strong> 地点</span>
          <span><strong id="stat-segments">0</strong> 路线</span>
          <span><strong id="stat-times">0</strong> 时间点</span>
        </div>
      </section>

      <section class="panel">
        <h2>时间安排</h2>
        <ol class="timeline" id="timeline"></ol>
      </section>

      <section class="panel">
        <h2>地点</h2>
        <ol class="place-list" id="place-list"></ol>
      </section>

      <section class="panel">
        <h2>路线</h2>
        <ol class="segment-list" id="segment-list"></ol>
      </section>
    </aside>

    <main class="map-area">
      <div class="mobile-topbar">
        <button class="menu-button" id="toggle-sidebar" type="button">行程</button>
        <div class="mobile-tabs" id="mobile-tabs" aria-label="移动端日期选择"></div>
      </div>
      <div id="map" aria-label="旅行地图"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="assets/app.js"></script>
</body>
</html>
