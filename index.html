<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cebu Trip Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <header class="trip-header">
        <p class="eyebrow">Cebu Trip Map</p>
        <div class="edit-row global-edit-row">
          <button class="edit-button" id="unlock-edit" type="button">编辑</button>
          <span class="save-status" id="save-status"></span>
        </div>
      </header>

      <section class="panel">
        <h2>日期</h2>
        <div class="day-tabs" id="day-tabs" aria-label="选择日期"></div>
      </section>

      <section class="panel day-panel">
        <h2 id="day-title">行程</h2>
        <textarea class="day-note-editor" id="day-note" rows="3" placeholder="备注"></textarea>
      </section>

      <section class="panel">
        <h2>时间安排</h2>
        <ol class="timeline" id="timeline"></ol>
      </section>

      <section class="panel">
        <h2>地点</h2>
        <ol class="place-list" id="place-list"></ol>
      </section>

      <section class="panel">
        <h2>路线</h2>
        <ol class="segment-list" id="segment-list"></ol>
      </section>
    </aside>
    <div class="sidebar-resizer" id="sidebar-resizer" aria-hidden="true"></div>
    <main class="map-area">
      <div class="mobile-topbar">
        <button class="menu-button" id="toggle-sidebar" type="button">行程</button>
        <div class="mobile-tabs" id="mobile-tabs" aria-label="移动端日期选择"></div>
      </div>
      <div id="map" aria-label="旅行地图"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="assets/app.js"></script>
</body>
</html>
